    - generic [ref=e21]:
      - paragraph [ref=e22]: About Play2Win Games
      - heading "Knoxville's local stop for retro gaming, TCGs, repairs, and community play." [level=1] [ref=e23]
      - paragraph [ref=e24]: We specialize in retro video games, trading card games, console and disc repair, and a shop experience built around buying, selling, trading, and playing.
    - generic [ref=e25]:
      - img "Play2Win Games store shelves and products" [ref=e27]
      - generic [ref=e28]:
        - heading "For collectors and players." [level=2] [ref=e29]
        - paragraph [ref=e30]: Play2Win Games carries TCG singles and sealed product, retro and modern video games, consoles, accessories, and repair services. Whether you're chasing a card, rebuilding a childhood collection, entering an event, or trading in gear, the shop is built to keep the process straightforward.
        - paragraph [ref=e31]: Our inventory changes often, and the online CrystalCommerce catalog gives customers a quick way to browse available TCG stock before coming in.
        - generic [ref=e32]:
          - link "Browse TCG Inventory" [ref=e33] [cursor=pointer]:
            - /url: https://playtowingames.crystalcommerce.com/
          - link "Meet the Team" [ref=e34] [cursor=pointer]:
            - /url: team.html
    - generic [ref=e35]:
      - generic [ref=e36]:
        - paragraph [ref=e37]: Our story
        - heading "How Play 2 Win Games came together." [level=2] [ref=e38]
      - generic [ref=e39]:
        - paragraph [ref=e40]:
          - text: Play 2 Win Games officially opened its doors on
          - strong [ref=e41]: October 28th, 2023
          - text: ", founded by"
          - strong [ref=e42]: Mark Spears
          - text: and
          - strong [ref=e43]: Josiah Miller
          - text: . What began as two individual journeys in the trading card world became a shared vision that grew into a full-scale retail gaming business.
        - paragraph [ref=e44]: "Josiah began buying and reselling Yu-Gi-Oh!, Pokémon, and Magic: The Gathering cards in April of 2010. Mark began his journey in August of 2015, primarily buying and reselling Yu-Gi-Oh!. The two met in 2015 and quickly became friends, connected through a mutual enthusiasm for games, trading cards, and community building. Over the next eight years, they discussed opening a store that combined passion with a welcoming environment for families and gamers."
    - generic [ref=e45]:
