        - heading "This is Bulky." [level=2] [ref=e65]
        - paragraph [ref=e66]: The shop’s resident sunglass-wearing goat — gold chain and opinions on every game we sell. You’ll spot him in the logo, around the shop, and (if you know what you’re doing) somewhere a little more hidden than that.
        - paragraph [ref=e67]: The name’s a running shop joke — he keeps eating our bulk cards. We’ve made peace with it.
