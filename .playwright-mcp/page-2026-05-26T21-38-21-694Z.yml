          - paragraph [ref=e55]: Tested retro hardware, video games, TCG inventory, supplies, and event entries.
        - article [ref=e56]:
          - heading "Trade" [level=3] [ref=e57]
          - paragraph [ref=e58]: Bring in what you are done with and turn it into the next piece for your collection.
        - article [ref=e59]:
          - heading "Repair" [level=3] [ref=e60]
          - paragraph [ref=e61]: Console repair, disc resurfacing, and practical service for players who want gear working again.
