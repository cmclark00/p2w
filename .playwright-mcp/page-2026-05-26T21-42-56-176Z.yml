  - main [ref=e20]:
    - generic [ref=e21]:
      - paragraph [ref=e22]: Card grading
      - heading "How we grade card condition." [level=1] [ref=e23]
      - paragraph [ref=e24]: Five grades, photo reference for each. If you’re selling singles to us, this is how we’ll assess them — same criteria every time, no surprises at the counter.
    - generic [ref=e25]:
      - generic [ref=e26]:
        - img "Near Mint card example" [ref=e28]
        - generic [ref=e29]:
          - heading "Near Mint (NM)" [level=2] [ref=e30]
          - paragraph [ref=e31]: Near Mint cards show minimal or no wear from play or handling and will have an unmarked surface, crisp corners, and otherwise pristine edges outside of minimal handling. Near Mint cards appear “fresh out of the pack,” with edges and surfaces virtually free from all flaws.
          - paragraph [ref=e32]:
            - strong [ref=e33]: Near Mint is not Mint.
            - text: Near Mint condition does not guarantee a professional grade if submitted to a grading service.
      - generic [ref=e34]:
        - img "Lightly Played card example" [ref=e36]
        - generic [ref=e37]:
          - heading "Lightly Played (LP)" [level=2] [ref=e38]
          - paragraph [ref=e39]: Lightly Played cards can have slight border or corner wear, or possibly minor scratches. No major defects are present, and there are fewer than 4 total flaws on the card. Lightly Played foils may have slight fading or indications of wear on the card face.
      - generic [ref=e40]:
        - img "Moderately Played card example" [ref=e42]
        - generic [ref=e43]:
          - heading "Moderately Played (MP)" [level=2] [ref=e44]
          - paragraph [ref=e45]: Moderately Played cards have moderate wear, or flaws apparent to the naked eye. They can show moderate border wear, mild corner wear, water damage, scratches, creases or fading, light dirt buildup, or any combination of these defects.
      - generic [ref=e46]:
        - generic:
          - img "Heavily Played card example"
        - generic [ref=e47]:
          - heading "Heavily Played (HP)" [level=2] [ref=e48]
          - paragraph [ref=e49]: Heavily Played cards exhibit signs of heavy wear. They may include cards that have significant creasing, folding, severe water damage, heavy whitening, heavy border wear, and/or tearing.
      - generic [ref=e50]:
        - generic:
          - img "Damaged card example"
        - generic [ref=e51]:
          - heading "Damaged (D)" [level=2] [ref=e52]
          - paragraph [ref=e53]: Damaged cards show obvious tears, bends, or creases that could make the card illegal for tournament play, even when sleeved. They may have massive border wear, writing or major inking (e.g., white-bordered cards with black-markered front borders), massive corner wear, prevalent scratching, folds, creases, or tears.
    - generic [ref=e54]:
      - generic [ref=e55]:
        - paragraph [ref=e56]: Ready to sell?
        - heading "Bring your cards by — no appointment needed." [level=2] [ref=e57]
        - paragraph [ref=e58]: We’ll grade everything together with you at the counter so you know exactly how each card landed. Sealed boxes and graded slabs get priced individually too.
      - link "Sell & Trade Process" [ref=e59] [cursor=pointer]:
        - /url: sell-trade.html
