      - paragraph [ref=e22]: Privacy
      - heading "Privacy Policy" [level=1] [ref=e23]
      - paragraph [ref=e24]: Plain-English summary of what we collect, why, who processes it, and the rights you have over your information.
    - generic [ref=e25]:
      - paragraph [ref=e26]: "Effective date: May 16, 2026 · Last updated: May 16, 2026"
      - paragraph [ref=e27]:
        - text: Play2Win Games (“we,” “us,” “the shop”) operates this website. We keep data collection to a minimum. This page explains exactly what we do and don’t do with your information. If anything here is unclear, email us at
        - link "inquiries@play2wingames.com" [ref=e28] [cursor=pointer]:
          - /url: mailto:inquiries@play2wingames.com
        - text: .
      - heading "1. Who we are" [level=2] [ref=e29]
      - paragraph [ref=e30]:
        - text: Play2Win Games · 3903 Western Avenue, Knoxville, TN 37921 ·
        - link "865-910-8357" [ref=e31] [cursor=pointer]:
          - /url: tel:+18659108357
        - text: ·
        - link "inquiries@play2wingames.com" [ref=e32] [cursor=pointer]:
          - /url: mailto:inquiries@play2wingames.com
        - text: . The shop owners are the data controllers for the information described here.
      - heading "2. What we collect" [level=2] [ref=e33]
      - paragraph [ref=e34]:
        - strong [ref=e35]: Information you give us through a form.
        - text: If you fill out the
        - link "upgrade request" [ref=e36] [cursor=pointer]:
          - /url: upgrade-request.html
        - text: or
        - link "event inquiry" [ref=e37] [cursor=pointer]:
          - /url: event-inquiry.html
        - text: form, we collect what you type in — typically your name, phone number, email address, and the details of your request. We only ask for what we need to follow up with you.
      - paragraph [ref=e38]:
        - strong [ref=e39]: Game leaderboard.
        - text: Our hidden retro game lets you save a high score under three initials of your choosing. We store those initials, the score, and a timestamp. We do not attach this to your name or any contact information, and the initials are whatever you decide to enter.
      - paragraph [ref=e40]:
        - strong [ref=e41]: Information collected automatically.
        - text: Like virtually every website, our hosting provider and the third-party services below may log technical data such as your IP address, browser type, and the pages you request, for security and to make the site work. We do not run analytics, advertising, or behavioral tracking, and we do not build profiles of visitors.
      - heading "3. How we use it" [level=2] [ref=e42]
      - list [ref=e43]:
        - listitem [ref=e44]: To respond to your repair, upgrade, sell/trade, or event inquiries.
        - listitem [ref=e45]: To operate, secure, and maintain the website.
        - listitem [ref=e46]: To display the game leaderboard.
      - paragraph [ref=e47]: We do not use your information for marketing emails, advertising, or automated decision-making.
      - heading "4. Services we rely on" [level=2] [ref=e48]
      - paragraph [ref=e49]: "We use a small number of reputable third parties to run the site. When you use the relevant feature, your information is processed by:"
      - list [ref=e50]:
        - listitem [ref=e51]:
          - strong [ref=e52]: Formspree
          - text: — delivers form submissions to our inbox. (
          - link "Privacy policy" [ref=e53] [cursor=pointer]:
            - /url: https://formspree.io/legal/privacy-policy/
          - text: )
        - listitem [ref=e54]:
          - strong [ref=e55]: Google Firebase
          - text: — stores the game leaderboard. (
          - link "Privacy" [ref=e56] [cursor=pointer]:
            - /url: https://firebase.google.com/support/privacy
          - text: )
        - listitem [ref=e57]:
          - strong [ref=e58]: Google Maps
          - text: — the contact page can show a map, but it stays unloaded until you click “Load map.” Google is only contacted, and only receives your IP address, if you choose to load it. (
          - link "Privacy" [ref=e59] [cursor=pointer]:
            - /url: https://policies.google.com/privacy
          - text: )
        - listitem [ref=e60]:
          - strong [ref=e61]: GoDaddy
          - text: — hosts the website and may keep standard server logs. (
          - link "Privacy" [ref=e62] [cursor=pointer]:
            - /url: https://www.godaddy.com/legal/agreements/privacy-policy
          - text: )
      - paragraph [ref=e63]: We do not sell, rent, or trade your personal information to anyone. We only share what’s necessary with the processors above so the site can function.
      - heading "5. Cookies & local storage" [level=2] [ref=e64]
      - paragraph [ref=e65]: This website does not set its own tracking or advertising cookies, and there is no analytics or ad technology on it — which is why you won’t see a cookie consent banner. Our fonts are self-hosted, so simply browsing the site contacts no third party. If you choose to load the Google Map, or play the hidden Firebase-powered game, those Google services may then set their own cookies or use your browser’s local storage to function. You can block or clear these through your browser settings; the only things affected are the optional map and game.
      - heading "6. How long we keep it" [level=2] [ref=e66]
      - paragraph [ref=e67]: Form submissions are kept in our email and business records only as long as needed to handle your request and for ordinary recordkeeping, then deleted. Leaderboard entries remain until we reset the board. You can ask us to delete your information at any time (see below).
      - heading "7. Your rights" [level=2] [ref=e68]
      - paragraph [ref=e69]: "Wherever you live, you can ask us to:"
      - list [ref=e70]:
        - listitem [ref=e71]:
          - strong [ref=e72]: Access
          - text: the personal information we hold about you;
        - listitem [ref=e73]:
          - strong [ref=e74]: Correct
          - text: anything that’s inaccurate;
        - listitem [ref=e75]:
          - strong [ref=e76]: Delete
          - text: your information;
        - listitem [ref=e77]:
          - strong [ref=e78]: Restrict or object
          - text: to how we use it;
        - listitem [ref=e79]:
          - strong [ref=e80]: Receive a copy
          - text: of what you submitted, in a portable format.
      - paragraph [ref=e81]:
        - text: These mirror the rights provided under the EU/UK
        - strong [ref=e82]: GDPR
        - text: and the
        - strong [ref=e83]: California Consumer Privacy Act (CCPA/CPRA)
        - text: . Where GDPR applies, our legal basis is your consent when you submit a form, and our legitimate interest in operating and securing the site. We do not “sell” or “share” personal information as those terms are defined under California law, and we will never discriminate against you for exercising a privacy right.
      - heading "8. How to exercise your rights" [level=2] [ref=e84]
      - paragraph [ref=e85]:
        - text: Email
        - link "inquiries@play2wingames.com" [ref=e86] [cursor=pointer]:
          - /url: mailto:inquiries@play2wingames.com
        - text: or call
        - link "865-910-8357" [ref=e87] [cursor=pointer]:
          - /url: tel:+18659108357
        - text: with your request. We’ll respond within a reasonable timeframe (and within the periods required by applicable law). We may need to verify your identity before acting on a request.
      - heading "9. Children" [level=2] [ref=e88]
      - paragraph [ref=e89]: Our events are all ages, but this website is not directed at children under 13 and we do not knowingly collect personal information from them. Form submissions should be made by an adult or with a parent’s involvement. If you believe a child has sent us personal information, contact us and we’ll delete it.
      - heading "10. Where your information is processed" [level=2] [ref=e90]
      - paragraph [ref=e91]: We are based in the United States, and the services we use process data in the U.S. and other countries. If you contact us from outside the U.S., you understand your information will be handled in the U.S.
      - heading "11. Changes to this policy" [level=2] [ref=e92]
      - paragraph [ref=e93]: If we change our practices we’ll update this page and the “Last updated” date above. Material changes will be noted here.
      - heading "12. Contact" [level=2] [ref=e94]
      - paragraph [ref=e95]:
