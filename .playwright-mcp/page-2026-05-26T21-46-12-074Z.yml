    - generic [ref=e21]:
      - paragraph [ref=e22]: Careers
      - heading "Want to work with us?" [level=1] [ref=e23]
      - paragraph [ref=e24]: We hire people who actually play the games and care about the customer across the counter. If that sounds like you, fill out the form below and email your resume — we’ll be in touch.
    - generic [ref=e25]:
      - generic [ref=e26]:
        - paragraph [ref=e27]: What we’re looking for
        - heading "People who play." [level=2] [ref=e28]
      - generic [ref=e29]:
        - article [ref=e30]:
          - heading "Counter & Sales" [level=3] [ref=e31]
          - paragraph [ref=e32]: Greet customers, ring up sales, talk shop, and keep the floor running. Comfort with retail POS and product knowledge across video games / TCG / consoles is a plus.
        - article [ref=e33]:
          - heading "TCG Specialist" [level=3] [ref=e34]
          - paragraph [ref=e35]: Pricing singles, sorting trade-ins, running events, knowing your game inside-out. Pokémon, Magic, Yu-Gi-Oh!, Lorcana, One Piece — pick your lane.
        - article [ref=e36]:
          - heading "Repair Tech" [level=3] [ref=e37]
          - paragraph [ref=e38]: Console and handheld repair bench. Soldering experience preferred but not required for entry-level — we’ll train. Patience and a steady hand matter more than a certification.
        - article [ref=e39]:
          - heading "Event Coordinator" [level=3] [ref=e40]
          - paragraph [ref=e41]: Running tournaments, league nights, release parties. Familiarity with TOM, Cardio, or Bandai TCG+ helps. Weekends are the busy nights here.
