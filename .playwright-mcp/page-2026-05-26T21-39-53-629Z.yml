          - paragraph [ref=e42]: Junior Repair Tech
          - paragraph [ref=e43]: Got into repairs after diving deep into Game Boy Color mods — and from there Keith taught me how to tear into pretty much everything else. I’m the handheld and software guy around here, while Keith is the master of all things soldering and retro hardware.
