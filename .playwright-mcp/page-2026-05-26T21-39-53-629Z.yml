      - heading "Console and handheld repair in Knoxville." [level=1] [ref=e23]
      - paragraph [ref=e24]: Bring in your broken, dead, or damaged gear. We handle screen replacements, battery service, disc resurfacing, controller fixes, and board-level repairs — plus handheld mods.
