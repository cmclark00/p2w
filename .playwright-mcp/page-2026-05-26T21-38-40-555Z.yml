    - generic [ref=e176]:
      - generic [ref=e177]:
        - paragraph [ref=e178]: Get the best offer
        - heading "A few small things move the needle." [level=2] [ref=e179]
        - list [ref=e180]:
          - listitem [ref=e181]:
            - text: ✓
            - strong [ref=e182]: Bring everything.
            - text: Original box, manual, inserts, all cables and controllers — complete items always offer more.
          - listitem [ref=e183]:
            - text: ✓
            - strong [ref=e184]: Test before you bring.
            - text: If you know it works, say so. We’ll still test, but it speeds things up.
          - listitem [ref=e185]:
            - text: ✓
            - strong [ref=e186]: Clean is better.
            - text: A wipe-down on consoles and a quick look through card binders helps us move faster.
          - listitem [ref=e187]:
            - text: ✓
            - strong [ref=e188]: Sleeve your singles.
            - text: Cards in penny sleeves or a binder get valued more efficiently than loose stacks.
          - listitem [ref=e189]:
            - text: ✓
            - strong [ref=e190]: Don’t toss the “junk.”
            - text: Bring the broken stuff, the loose discs, the obscure accessories. You’d be surprised what we’ll buy.
