        - heading "Three steps, same day." [level=2] [ref=e158]
      - generic [ref=e159]:
        - article [ref=e160]:
          - generic [ref=e161]: "01"
          - heading "Bring It In" [level=3] [ref=e162]
          - paragraph [ref=e163]: Walk in any time during store hours — no appointment needed. For big collections, give us a heads up and we’ll clear the counter.
        - article [ref=e164]:
          - generic [ref=e165]: "02"
          - heading "We Evaluate" [level=3] [ref=e166]
          - paragraph [ref=e167]: Our team checks condition, completeness, and current market value. Most evaluations wrap up the same visit.
        - article [ref=e168]:
          - generic [ref=e169]: "03"
          - heading "Cash or Credit" [level=3] [ref=e170]
          - paragraph [ref=e171]:
            - text: Take cash on the spot, take store credit (worth more — up to
            - strong [ref=e172]: 50%
            - text: on video games, 20% on consoles, 10% on TCG; bulk is flat), or apply it directly to a trade. Whatever works for you.
      - paragraph [ref=e173]:
        - text: Common trade-in questions — what we buy, how to sort cards, how we price TCGs — answered in the
        - link "FAQ" [ref=e174] [cursor=pointer]:
