      - generic [ref=e32]:
        - article [ref=e33]:
          - heading "Video Games" [level=3] [ref=e34]
          - paragraph [ref=e35]: Retro through modern. NES, SNES, N64, Genesis, GameCube, PS1–PS5, Xbox through Series X, Switch, handhelds, and Japanese imports.
        - article [ref=e36]:
          - heading "Consoles & Handhelds" [level=3] [ref=e37]
          - paragraph [ref=e38]: Working or broken — we buy both. Boxed and CIB units get top dollar. Even parts consoles have value.
        - article [ref=e39]:
          - heading "TCG Singles & Sealed" [level=3] [ref=e40]
          - paragraph [ref=e41]: Pokémon, Magic, Yu-Gi-Oh!, Lorcana, One Piece, Digimon, Gundam, Riftbound, and more. Loose singles, sealed product, and graded slabs.
        - article [ref=e42]:
          - heading "Accessories & Supplies" [level=3] [ref=e43]
          - paragraph [ref=e44]: Controllers, cables, memory cards, light guns, peripherals, playmats, sleeves, deck boxes, binders — if it’s game-related, bring it in.
        - article [ref=e45]:
          - heading "Full Collections" [level=3] [ref=e46]
          - paragraph [ref=e47]: Inherited a basement full of games? Closing out a binder? We buy collections big and small, and can travel for the right lot.
