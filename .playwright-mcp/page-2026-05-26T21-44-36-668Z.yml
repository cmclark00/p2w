          - paragraph [ref=e37]: Controllers, cables, memory cards, light guns, peripherals, playmats, sleeves, deck boxes, binders — if it’s game-related, bring it in.
        - article [ref=e38]:
          - heading "Full Collections" [level=3] [ref=e39]
