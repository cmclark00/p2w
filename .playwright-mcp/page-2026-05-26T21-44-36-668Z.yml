          - heading "Bring It In" [level=3] [ref=e155]
          - paragraph [ref=e156]: Walk in any time during store hours — no appointment needed. For big collections, give us a heads up and we’ll clear the counter.
        - article [ref=e157]:
          - generic [ref=e158]: "02"
          - heading "We Evaluate" [level=3] [ref=e159]
          - paragraph [ref=e160]: Our team checks condition, completeness, and current market value. Most evaluations wrap up the same visit.
        - article [ref=e161]:
          - generic [ref=e162]: "03"
          - heading "Cash or Credit" [level=3] [ref=e163]
          - paragraph [ref=e164]:
            - text: Take cash on the spot, take store credit (worth more — up to
            - strong [ref=e165]: 50%
            - text: on video games, 20% on consoles, 10% on TCG; bulk is flat), or apply it directly to a trade. Whatever works for you.
