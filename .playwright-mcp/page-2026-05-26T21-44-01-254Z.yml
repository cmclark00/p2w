        - article [ref=e23]:
          - heading "Counter & Sales" [level=3] [ref=e24]
          - paragraph [ref=e25]: Greet customers, ring up sales, talk shop, and keep the floor running. Comfort with retail POS and product knowledge across video games / TCG / consoles is a plus.
        - article [ref=e26]:
          - heading "TCG Specialist" [level=3] [ref=e27]
          - paragraph [ref=e28]: Pricing singles, sorting trade-ins, running events, knowing your game inside-out. Pokémon, Magic, Yu-Gi-Oh!, Lorcana, One Piece — pick your lane.
        - article [ref=e29]:
          - heading "Repair Tech" [level=3] [ref=e30]
          - paragraph [ref=e31]: Console and handheld repair bench. Soldering experience preferred but not required for entry-level — we’ll train. Patience and a steady hand matter more than a certification.
        - article [ref=e32]:
          - heading "Event Coordinator" [level=3] [ref=e33]
          - paragraph [ref=e34]: Running tournaments, league nights, release parties. Familiarity with TOM, Cardio, or Bandai TCG+ helps. Weekends are the busy nights here.
