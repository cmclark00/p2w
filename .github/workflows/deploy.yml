name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Redeploy after the nightly Google Calendar sync finishes
  # (its commit uses [skip ci], so a plain push trigger would skip it).
  workflow_run:
    workflows: ["Sync Google Calendar Events"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
