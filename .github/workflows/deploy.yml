name: Deploy to GoDaddy via FTP

# Cutover-branch deploy: push static site files to GoDaddy via FTP.
# Replaces the GitHub Pages deploy that lives on `main`. Merge this
# branch to `main` at cutover and the next push triggers an FTP deploy
# instead of a Pages build.
#
# REQUIRED SECRETS (set in repo Settings → Secrets and variables → Actions):
#   GODADDY_FTP_HOST     - e.g. ftp.play2wingames.com  (or the IP/host
#                          GoDaddy gives you under "File Manager > FTP")
#   GODADDY_FTP_USER     - FTP username from the same GoDaddy panel
#   GODADDY_FTP_PASSWORD - FTP password (rotate it after first deploy)
#
# OPTIONAL TWEAK:
#   server-dir below defaults to ./public_html/ which is the standard
#   GoDaddy document root. If your hosting plan uses a different path
#   (rare) update it.

on:
  push:
    branches: [main]
  # Redeploy after the nightly Google Calendar sync finishes
  # (its commit uses [skip ci], so a plain push trigger would skip it).
  workflow_run:
    workflows: ["Sync Google Calendar Events"]
    types: [completed]
  workflow_dispatch:

# One deploy at a time; let in-progress runs finish.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Deploy with lftp's recursive mirror. We previously used
      # SamKirkland/FTP-Deploy-Action, but its basic-ftp engine reliably
      # FAILED to push files into subdirectories on GoDaddy's FTP server:
      # root-level files uploaded fine, but every nested dir (assets/**)
      # came out EMPTY on the server with no error raised — confirmed even
      # with a clean-slate full re-upload. lftp's `mirror -R` handles
      # recursive directory creation + upload correctly against GoDaddy.
      - name: Build clean deploy dir
        # Copy only the public site files — drop repo plumbing + dev-only docs
        # (same exclusion intent as the old action's `exclude:` list).
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='scripts' \
            --exclude='_site' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            --exclude='team-guide-print.html' \
            --exclude='WEBSITE-AGREEMENT.md' \
            ./ _site/
          echo "Files staged for upload:"; find _site -type f | wc -l

      - name: Deploy via lftp mirror
        env:
          FTP_HOST: ${{ secrets.GODADDY_FTP_HOST }}
          FTP_USER: ${{ secrets.GODADDY_FTP_USER }}
          FTP_PASS: ${{ secrets.GODADDY_FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          # --reverse: upload (local -> remote); --delete: prune remote files
          # not present locally so the host stays in sync with the repo.
          #
          # NOTE: the FTP secrets MUST belong to the SAME hosting account that
          # actually serves play2wingames.com (the cPanel whose File Manager
          # shows the live files). A prior set of creds pointed at a different,
          # non-serving account — every upload silently went into a void.
          lftp -c "
          set ftp:ssl-allow no;
          set net:max-retries 3;
          set net:timeout 25;
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
          set cmd:fail-exit yes;
          mirror --reverse --delete --verbose --parallel=2 \
                 _site/ public_html/;
          "
