name: Sync Google Calendar Events

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC = 2 AM EDT every night
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth google-api-python-client pyyaml

      - name: Fetch events from Google Calendar
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        run: python .github/scripts/sync_events.py

      - name: Post events to Discord
        env:
          DISCORD_EVENTS_WEBHOOK: ${{ secrets.DISCORD_EVENTS_WEBHOOK }}
        run: python .github/scripts/post_events_to_discord.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json .github/discord-events-state.json
          git diff --cached --quiet || git commit -m "chore: sync events + Discord state [skip ci]"
          git push
